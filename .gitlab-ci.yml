image: node:20

stages:
  - install
  - image
  - lint
  - typecheck
  - test
  - build

default:
  interruptible: true
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - .yarn/cache/
      - node_modules/
  before_script:
    - corepack enable
    - yarn install --immutable

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.run_optional_script:
  script:
    - |
      if node -e "const scripts=require('./package.json').scripts||{}; process.exit(scripts[process.env.NPM_SCRIPT] ? 0 : 1)"; then
        yarn "$NPM_SCRIPT"
      else
        echo "Skipping missing script: $NPM_SCRIPT"
      fi

install:
  stage: install
  script:
    - yarn install --immutable

build_backend_image:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  before_script: []
  cache: []
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - |
      DESTINATIONS="--destination $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
      if [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        DESTINATIONS="$DESTINATIONS --destination $CI_REGISTRY_IMAGE:dev"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        DESTINATIONS="$DESTINATIONS --destination $CI_REGISTRY_IMAGE:prod"
      fi
      /kaniko/executor --context "$CI_PROJECT_DIR" --dockerfile "$CI_PROJECT_DIR/Dockerfile" $DESTINATIONS
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "main"'

lint:
  stage: lint
  variables:
    NPM_SCRIPT: lint
  extends: .run_optional_script

typecheck:
  stage: typecheck
  variables:
    NPM_SCRIPT: type-check
  extends: .run_optional_script

test:
  stage: test
  variables:
    NPM_SCRIPT: test
  extends: .run_optional_script

build:
  stage: build
  script:
    - yarn build
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - dist/
