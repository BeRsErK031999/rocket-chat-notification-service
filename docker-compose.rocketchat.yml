services:
  rocketchat:
    image: registry.rocket.chat/rocketchat/rocket.chat:latest
    container_name: notification-service-rocketchat
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ROOT_URL: http://localhost:3000
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/rocketchat?replicaSet=rs0&directConnection=true
      MONGO_OPLOG_URL: mongodb://mongo:27017/local?replicaSet=rs0&directConnection=true
      DEPLOY_METHOD: docker
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/info').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  mongo:
    image: bitnami/mongodb:6.0
    container_name: notification-service-mongo
    restart: unless-stopped
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_ADVERTISED_HOSTNAME: mongo
    volumes:
      - mongo_data:/bitnami/mongodb
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nats:
    image: nats:2-alpine
    container_name: notification-service-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

volumes:
  mongo_data:
