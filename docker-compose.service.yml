services:
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: rocket-chat-notification-service:local
    container_name: rocket-chat-notification-service
    restart: unless-stopped
    environment:
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ROCKET_CHAT_URL: ${ROCKET_CHAT_URL:-http://host.docker.internal:3000}
      ROCKET_CHAT_USER_ID: ${ROCKET_CHAT_USER_ID:-rocket-chat-user-id}
      ROCKET_CHAT_AUTH_TOKEN: ${ROCKET_CHAT_AUTH_TOKEN:-rocket-chat-auth-token}
      NATS_URL: ${NATS_URL:-nats://host.docker.internal:4222}
      NATS_PREFIX: ${NATS_PREFIX:-notifications}
      NATS_STREAM_NAME: ${NATS_STREAM_NAME:-NOTIFICATIONS}
      NATS_DURABLE_PREFIX: ${NATS_DURABLE_PREFIX:-rocket-chat-notification-service}
      NATS_DLQ_SUBJECT: ${NATS_DLQ_SUBJECT:-notifications.dlq}
      DELIVERY_RETRY_ATTEMPTS: ${DELIVERY_RETRY_ATTEMPTS:-3}
      DELIVERY_RETRY_DELAY_MS: ${DELIVERY_RETRY_DELAY_MS:-500}
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
